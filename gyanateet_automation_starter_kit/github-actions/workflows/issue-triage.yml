name: Issue Triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Add needs-triage label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = [];
            const text = `${issue.title}
${issue.body || ''}`.toLowerCase();
            if (text.includes('bug') || text.includes('error') || text.includes('fail')) labels.push('bug');
            if (text.includes('doc') || text.includes('readme')) labels.push('documentation');
            if (text.includes('experiment') || text.includes('metric') || text.includes('ablation')) labels.push('experiment');
            if (text.includes('robot') || text.includes('s101') || text.includes('hardware')) labels.push('robotics');
            labels.push('needs-triage');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...new Set(labels)]
            });
